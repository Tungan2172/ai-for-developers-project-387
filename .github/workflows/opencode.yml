name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      (startsWith(github.event.comment.body, '/oc explain') ||
       startsWith(github.event.comment.body, '/oc fix') ||
       startsWith(github.event.comment.body, '/oc comment') ||
       contains(github.event.comment.body, ' /opencode') ||
       startsWith(github.event.comment.body, '/opencode')) &&
      !contains(fromJSON('["opencode[bot]", "github-actions[bot]"]'), github.actor)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set git identity
        run: |
          git config user.name "opencode[bot]"
          git config user.email "41898282+opencode[bot]@users.noreply.github.com"

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/deepseek-v4-flash-free
          use_github_token: false