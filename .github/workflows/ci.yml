name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  api-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install TypeSpec deps
        working-directory: api
        run: npm ci
      - name: Compile contract
        working-directory: api
        run: npx tsp compile . --warn-as-error

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync deps
        working-directory: backend
        run: uv sync
      - name: Lint (ruff)
        working-directory: backend
        run: uv run ruff check . && uv run ruff format --check .
      - name: Types (mypy)
        working-directory: backend
        run: uv run mypy
      - name: Tests (pytest)
        working-directory: backend
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Lint (eslint + prettier)
        working-directory: frontend
        run: npm run lint && npm run format:check
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Tests (vitest)
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        run: npm run build
