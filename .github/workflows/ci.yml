name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  api-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install TypeSpec deps
        working-directory: api
        run: npm ci
      - name: Compile contract
        working-directory: api
        run: npx tsp compile . --warn-as-error

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install TypeSpec deps
        working-directory: api
        run: npm ci
      - name: Compile contract
        working-directory: api
        run: npx tsp compile . --warn-as-error
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync deps
        working-directory: backend
        run: uv sync
      - name: Lint (ruff)
        working-directory: backend
        run: uv run ruff check . && uv run ruff format --check .
      - name: Types (mypy)
        working-directory: backend
        run: uv run mypy
      - name: Tests (pytest, incl. testcontainers)
        working-directory: backend
        run: uv run pytest
        timeout-minutes: 10

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Lint (eslint + prettier)
        working-directory: frontend
        run: npm run lint && npm run format:check
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Tests (vitest)
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scheduler
          POSTGRES_PASSWORD: scheduler
          POSTGRES_DB: scheduler
        options: >-
          --health-cmd pg_isready -U scheduler
          --health-interval 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: astral-sh/setup-uv@v5
      - name: Install backend deps
        working-directory: backend
        run: uv sync --no-dev
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium
      - name: Run e2e tests
        working-directory: frontend
        run: npx playwright test
        env:
          APP_DATABASE_URL: postgresql+psycopg://scheduler:scheduler@localhost:5432/scheduler
